<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ESP32 Web Flasher + Serial Console</title>
    <style>
      :root {
        color-scheme: dark;
        --accent-primary: #36a167;
        --accent-hover: #49c27d;
        --accent-strong: #2f8f4e;
        --accent-strong-hover: #3fae61;
        --surface-base: #222222;
        --surface-panel: #303030;
        --surface-control: #343434;
        --border-color: #3d454d;
        --text-primary: #e6eaf0;
        --text-secondary: #9aa4b2;
        --focus-ring: rgba(54, 161, 103, 0.35);
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        background: var(--surface-base);
        color: var(--text-primary);
      }
      main {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem 2rem;
      }
      .panel {
        background: var(--surface-panel);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 1rem;
        margin-bottom: 1rem;
      }
      h1,
      h2 {
        margin: 0 0 0.8rem;
      }
      .grid {
        display: grid;
        gap: 0.75rem;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }
      label {
        display: block;
        font-size: 0.92rem;
        margin-bottom: 0.25rem;
      }
      input,
      select,
      button {
        width: 100%;
        box-sizing: border-box;
        background: var(--surface-control);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 0.55rem 0.65rem;
      }
      input:focus,
      select:focus,
      button:focus-visible {
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px var(--focus-ring);
        outline: none;
      }
      button {
        cursor: pointer;
        background: var(--accent-strong);
        border-color: var(--accent-strong);
        color: #f6fff9;
        transition: background-color 120ms ease;
      }
      button:hover:not(:disabled) {
        background: var(--accent-strong-hover);
        border-color: var(--accent-strong-hover);
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .actions {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 0.5rem;
        margin-top: 0.75rem;
      }
      #log,
      #console {
        width: 100%;
        min-height: 180px;
        resize: vertical;
        background: var(--surface-control);
        color: #a7f3d0;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 0.65rem;
        box-sizing: border-box;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      #console {
        min-height: 260px;
      }
      .hint {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }
      progress {
        width: 100%;
        margin-top: 0.5rem;
        accent-color: var(--accent-primary);
      }
      .hidden {
        display: none;
      }
      .button-link {
        display: inline-block;
        width: 100%;
        box-sizing: border-box;
        background: var(--accent-strong);
        color: #f6fff9;
        border: 1px solid var(--accent-strong);
        border-radius: 8px;
        padding: 0.55rem 0.65rem;
        text-decoration: none;
        text-align: center;
        transition: background-color 120ms ease, border-color 120ms ease;
      }
      .button-link:hover {
        background: var(--accent-strong-hover);
        border-color: var(--accent-strong-hover);
      }
      .button-link:focus-visible {
        border-color: var(--accent-primary);
        box-shadow: 0 0 0 3px var(--focus-ring);
        outline: none;
      }
      .serial-link {
        margin-bottom: 0.8rem;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ESP32 Web Flasher</h1>
      <p class="hint">Use Chrome/Edge with Web Serial support.</p>

      <section class="panel">
        <h2>Flashing</h2>
        <div class="grid">
          <div>
            <label for="firmwareSelect">Firmware</label>
            <select id="firmwareSelect"></select>
          </div>
          <div>
            <label for="boardSelect">Board</label>
            <select id="boardSelect"></select>
          </div>
          <div>
            <label for="versionSelect">Version</label>
            <select id="versionSelect"></select>
          </div>
          <div>
            <label for="imageTypeSelect">Image type</label>
            <select id="imageTypeSelect"></select>
          </div>
        </div>
        <div class="actions">
          <button id="flashBtn">Flash Firmware</button>
          <button id="eraseBtn">Full Erase Device</button>
          <button id="disconnectFlasher" disabled>Disconnect Flasher</button>
        </div>
        <progress id="progress" value="0" max="100"></progress>
        <textarea id="log" readonly></textarea>
      </section>

      <section class="panel">
        <a class="button-link serial-link" href="https://config.meshcore.io/" target="_blank" rel="noopener noreferrer">
          Open MeshCore Config
        </a>
        <h2>Serial Console</h2>
        <div class="actions">
          <button id="connectSerial">Connect Serial</button>
          <button id="disconnectSerial" disabled>Disconnect Serial</button>
          <button id="clearConsole">Clear Console</button>
        </div>
        <div class="grid" style="margin-top: 0.75rem">
          <div>
            <label for="serialInput">Serial command/input</label>
            <input id="serialInput" type="text" placeholder="Type command and click Send" />
          </div>
          <div>
            <label>&nbsp;</label>
            <button id="sendSerial" disabled>Send</button>
          </div>
          <div>
            <label>&nbsp;</label>
            <button id="insertWifiSsid">Insert: set wifi.ssid</button>
          </div>
          <div>
            <label>&nbsp;</label>
            <button id="insertWifiPwd">Insert: set wifi.pwd</button>
          </div>
        </div>
        <textarea id="console" readonly></textarea>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
